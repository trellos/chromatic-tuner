<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
    <title>TUNA</title>
    <link rel="stylesheet" href="./style.css" />
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
  </head>

  <body class="status-hidden">
    <main class="app">
      <header class="app-header">
        <div class="brand">
          <h1 class="hero-title" data-text="TUNA">TUNA</h1>
        </div>
      </header>

      <section class="mode-stage">
        <article
          id="mode-screen-tuner"
          class="mode-screen is-active"
          data-mode="tuner"
          role="tabpanel"
          aria-hidden="false"
        >
          <div class="mode-header">
            <div class="mode-title">Chromatic Tuner</div>
          </div>

          <div class="tuner-visual-toggle" role="group" aria-label="Tuner visual mode" data-no-mode-swipe>
            <button type="button" class="is-active" data-tuner-visual="strobe" aria-pressed="true">Strobe</button>
            <button type="button" data-tuner-visual="circle" aria-pressed="false">Circle</button>
          </div>

          <div id="tuna-field" class="tuna-field" aria-hidden="true"></div>

          <div class="tuner-stack">
            <div id="strobe-visualizer" class="strobe-tuner idle">
              <div id="tuna-field" class="tuna-field" aria-hidden="true"></div>
              <div id="reading">
                <div id="note"></div>
                <div id="cents"></div>
              </div>
            </div>

            <div class="tuner-circle-host is-hidden" data-tuner-circle-host></div>

            <div id="status"></div>
          </div>

        </article>

        <article
          id="mode-screen-wild-tuna"
          class="mode-screen"
          data-mode="wild-tuna"
          role="tabpanel"
          aria-hidden="true"
        >
          <div class="wild-tuna-mode-shell">
            <h2 class="wild-tuna-title">Wild Tuna</h2>
            <div class="wild-tuna-card" aria-label="Wild Tuna card">
              <img
                class="wild-tuna-fish"
                src="./favicon.svg"
                alt="Tuna"
                width="128"
                height="128"
              />
              <button
                class="carousel-toggle wild-tuna-fullscreen-trigger"
                type="button"
                aria-label="Go fullscreen"
                data-wild-tuna-fullscreen
              >
                <span class="fullscreen-icon" aria-hidden="true"></span>
              </button>
            </div>
            <div class="wild-tuna-composite" data-wild-tuna-composite>
              <section class="wild-tuna-pane wild-tuna-pane--drum" data-wild-tuna-drum></section>
              <section class="wild-tuna-pane wild-tuna-pane--circle">
                <div class="wild-tuna-circle-looper" data-wild-tuna-circle-looper></div>
                <div class="circle-mode-layout" data-wild-tuna-circle></div>
              </section>
              <section class="wild-tuna-pane wild-tuna-pane--fretboard" data-wild-tuna-fretboard></section>
            </div>
          </div>
        </article>

        <article
          id="mode-screen-metronome"
          class="mode-screen"
          data-mode="metronome"
          role="tabpanel"
          aria-hidden="true"
        >
          <div class="mode-header">
            <div class="mode-title">Metronome</div>
          </div>

          <div class="metronome-panel">
            <div
              id="tempo-dial"
              class="tempo-dial"
              role="slider"
              aria-label="Tempo"
              aria-valuemin="40"
              aria-valuemax="220"
              aria-valuenow="120"
              tabindex="0"
            >
              <div class="metro-starburst" aria-hidden="true"></div>
              <div class="tempo-wheel"></div>
              <div class="tempo-ring">
                <div class="tempo-indicator"></div>
                <div class="tempo-center">
                  <div id="tempo-value" class="tempo-value">120</div>
                  <div class="tempo-label">BPM</div>
                </div>
              </div>
            </div>
            <div class="metro-controls">
              <button class="ghost-btn" type="button" data-action="decrease">-</button>
              <button class="primary-btn" type="button" data-action="toggle">Start</button>
              <button class="ghost-btn" type="button" data-action="increase">+</button>
            </div>
            <div class="metro-options">
              <div class="option-chip metro-option">
                <button id="metro-time-button" class="option-btn" type="button" aria-haspopup="menu" aria-expanded="false">
                  Time 4/4
                </button>
                <div id="metro-time-menu" class="option-menu" role="menu">
                  <button type="button" role="menuitem" data-value="no-accent">No Accent</button>
                  <button type="button" role="menuitem" data-value="4/4">4/4</button>
                  <button type="button" role="menuitem" data-value="3/4">3/4</button>
                  <button type="button" role="menuitem" data-value="6/8">6/8</button>
                </div>
              </div>
              <div class="option-chip metro-option">
                <button id="metro-sound-button" class="option-btn" type="button" aria-haspopup="menu" aria-expanded="false">
                  Sound Woodblock
                </button>
                <div id="metro-sound-menu" class="option-menu" role="menu">
                  <button type="button" role="menuitem" data-sound="woodblock">Woodblock</button>
                  <button type="button" role="menuitem" data-sound="electro">Electro</button>
                  <button type="button" role="menuitem" data-sound="drum">Drum</button>
                  <button type="button" role="menuitem" data-sound="conga">Conga</button>
                </div>
              </div>
            </div>
          </div>
        </article>


        <article
          id="mode-screen-fretboard"
          class="mode-screen"
          data-mode="fretboard"
          role="tabpanel"
          aria-hidden="true"
        >
          <div class="mode-header">
            <div class="mode-title">Fretboard</div>
          </div>

          <div class="fretboard-layout">
            <div class="fretboard-board" aria-label="Guitar fretboard">
              <div class="fretboard-string-labels" aria-hidden="true">
                <span>E</span>
                <span>A</span>
                <span>D</span>
                <span>G</span>
                <span>B</span>
                <span>E</span>
              </div>
              <div class="fretboard-open-indicators" aria-hidden="true"></div>
              <div class="fretboard-frets" aria-hidden="true"></div>
              <div class="fretboard-strings" aria-hidden="true"></div>
              <div class="fretboard-inlays" aria-hidden="true">
                <span class="fretboard-inlay" style="--fret-index: 3" data-fret="3"></span>
                <span class="fretboard-inlay" style="--fret-index: 5" data-fret="5"></span>
                <span class="fretboard-inlay" style="--fret-index: 7" data-fret="7"></span>
                <span class="fretboard-inlay" style="--fret-index: 9" data-fret="9"></span>
                <span
                  class="fretboard-inlay fretboard-inlay--double-left"
                  style="--fret-index: 12"
                  data-fret="12"
                ></span>
                <span
                  class="fretboard-inlay fretboard-inlay--double-right"
                  style="--fret-index: 12"
                  data-fret="12"
                ></span>
              </div>
              <div class="fretboard-dots" aria-live="polite"></div>
            </div>

            <div class="fretboard-controls">
              <div class="fretboard-note-selector" role="radiogroup" aria-label="Root note" data-fretboard-hideable>
                <button type="button" data-fretboard-root="A">A</button>
                <button type="button" data-fretboard-root="A#">A#</button>
                <button type="button" data-fretboard-root="B">B</button>
                <button type="button" data-fretboard-root="C">C</button>
                <button type="button" data-fretboard-root="C#">C#</button>
                <button type="button" data-fretboard-root="D">D</button>
                <button type="button" data-fretboard-root="D#">D#</button>
                <button type="button" data-fretboard-root="E">E</button>
                <button type="button" data-fretboard-root="F">F</button>
                <button type="button" data-fretboard-root="F#">F#</button>
                <button type="button" data-fretboard-root="G">G</button>
                <button type="button" data-fretboard-root="G#">G#</button>
              </div>

              <div class="fretboard-segmented" data-fretboard-hideable>
                <button type="button" data-fretboard-display="chord">CHORD</button>
                <button type="button" data-fretboard-display="scale">SCALE</button>
                <button type="button" data-fretboard-display="key">KEY</button>
              </div>

              <label class="fretboard-characteristic-label" for="fretboard-characteristic" data-fretboard-hideable>Characteristic</label>
              <select id="fretboard-characteristic" class="fretboard-characteristic" data-fretboard-hideable></select>

              <div class="fretboard-segmented" data-fretboard-hideable>
                <button type="button" data-fretboard-annotation="notes">NOTES</button>
                <button type="button" data-fretboard-annotation="degrees">DEGREES</button>
              </div>

              <div class="fretboard-actions" data-fretboard-hideable>
                <button type="button" class="fretboard-play-action" data-fretboard-play>PLAY</button>
                <button type="button" class="fretboard-hide-action" data-fretboard-hide>HIDE</button>
              </div>
              <button
                type="button"
                class="fretboard-hidden-summary"
                data-fretboard-summary
                hidden
                aria-label="Show fretboard selectors"
              ></button>
            </div>
          </div>

          <!-- Template used by Wild Tuna to clone a fretboard into its composite layout. -->
          <template id="fretboard-template">
            <div class="fretboard-layout">
              <div class="fretboard-board" aria-label="Guitar fretboard">
                <div class="fretboard-string-labels" aria-hidden="true"><span>E</span><span>A</span><span>D</span><span>G</span><span>B</span><span>E</span></div>
                <div class="fretboard-open-indicators" aria-hidden="true"></div>
                <div class="fretboard-frets" aria-hidden="true"></div>
                <div class="fretboard-strings" aria-hidden="true"></div>
                <div class="fretboard-inlays" aria-hidden="true">
                  <span class="fretboard-inlay" style="--fret-index: 3" data-fret="3"></span>
                  <span class="fretboard-inlay" style="--fret-index: 5" data-fret="5"></span>
                  <span class="fretboard-inlay" style="--fret-index: 7" data-fret="7"></span>
                  <span class="fretboard-inlay" style="--fret-index: 9" data-fret="9"></span>
                  <span class="fretboard-inlay fretboard-inlay--double-left" style="--fret-index: 12" data-fret="12"></span>
                  <span class="fretboard-inlay fretboard-inlay--double-right" style="--fret-index: 12" data-fret="12"></span>
                </div>
                <div class="fretboard-dots" aria-live="polite"></div>
              </div>
              <div class="fretboard-controls">
                <div class="fretboard-note-selector" role="radiogroup" aria-label="Root note" data-fretboard-hideable>
                  <button type="button" data-fretboard-root="A">A</button><button type="button" data-fretboard-root="A#">A#</button><button type="button" data-fretboard-root="B">B</button><button type="button" data-fretboard-root="C">C</button><button type="button" data-fretboard-root="C#">C#</button><button type="button" data-fretboard-root="D">D</button><button type="button" data-fretboard-root="D#">D#</button><button type="button" data-fretboard-root="E">E</button><button type="button" data-fretboard-root="F">F</button><button type="button" data-fretboard-root="F#">F#</button><button type="button" data-fretboard-root="G">G</button><button type="button" data-fretboard-root="G#">G#</button>
                </div>
                <div class="fretboard-segmented" data-fretboard-hideable><button type="button" data-fretboard-display="chord">CHORD</button><button type="button" data-fretboard-display="scale">SCALE</button><button type="button" data-fretboard-display="key">KEY</button></div>
                <label class="fretboard-characteristic-label" for="fretboard-characteristic" data-fretboard-hideable>Characteristic</label>
                <select id="fretboard-characteristic" class="fretboard-characteristic" data-fretboard-hideable></select>
                <div class="fretboard-segmented" data-fretboard-hideable><button type="button" data-fretboard-annotation="notes">NOTES</button><button type="button" data-fretboard-annotation="degrees">DEGREES</button></div>
                <div class="fretboard-actions" data-fretboard-hideable><button type="button" class="fretboard-play-action" data-fretboard-play>PLAY</button><button type="button" class="fretboard-hide-action" data-fretboard-hide>HIDE</button></div>
                <button type="button" class="fretboard-hidden-summary" data-fretboard-summary hidden aria-label="Show fretboard selectors"></button>
              </div>
            </div>
          </template>
        </article>

        <article
          id="mode-screen-circle-of-fifths"
          class="mode-screen"
          data-mode="circle-of-fifths"
          role="tabpanel"
          aria-hidden="true"
        >
          <div class="mode-header">
            <div class="mode-title">Circle of Fifths</div>
          </div>

          <div class="circle-mode-layout" data-circle-host></div>
        </article>

        <article
          id="mode-screen-drum-machine"
          class="mode-screen"
          data-mode="drum-machine"
          role="tabpanel"
          aria-hidden="true"
        >
          <button id="drum-exit" class="drum-exit" type="button" aria-label="Exit fullscreen">
            X
          </button>
          <div class="mode-header">
            <div class="mode-title">Drum Machine</div>
            <button
              id="carousel-toggle"
              class="carousel-toggle drum-fullscreen-toggle"
              type="button"
              aria-label="Fullscreen"
              disabled
            >
              <span class="fullscreen-icon" aria-hidden="true"></span>
            </button>
          </div>

          <div data-drum-host></div>
        </article>

        <article
          id="mode-screen-extra-jimmy"
          class="mode-screen"
          data-mode="extra-jimmy"
          role="tabpanel"
          aria-hidden="true"
        >
          <div class="ej-shell">
            <div class="ej-neck ej-neck--low" data-ej-neck="low" aria-label="Low neck">
              <div class="ej-neck-label" aria-hidden="true">LOW</div>
              <div class="ej-neck-viewport"></div>
            </div>

            <div class="ej-controls">
              <div class="ej-controls-inner">
                <label class="ej-control-label" for="ej-harmony-select">Harmony</label>
                <select id="ej-harmony-select" class="ej-select" data-ej-harmony>
                  <option value="1">2nd</option>
                  <option value="2" selected>3rd</option>
                  <option value="3">4th</option>
                  <option value="4">5th</option>
                  <option value="5">6th</option>
                  <option value="6">7th</option>
                  <option value="7">Oct</option>
                  <option value="8">9th</option>
                  <option value="10">11th</option>
                </select>

                <label class="ej-control-label">Key</label>
                <div class="ej-key-chip">
                  <button type="button" class="ej-key-btn" data-ej-key-trigger
                    aria-haspopup="true" aria-expanded="false" aria-label="Select key: C">C</button>
                  <div class="ej-key-popup" data-ej-key-popup hidden role="menu">
                    <button type="button" role="menuitem" data-ej-key-note="C">C</button>
                    <button type="button" role="menuitem" data-ej-key-note="C#">C#</button>
                    <button type="button" role="menuitem" data-ej-key-note="D">D</button>
                    <button type="button" role="menuitem" data-ej-key-note="D#">D#</button>
                    <button type="button" role="menuitem" data-ej-key-note="E">E</button>
                    <button type="button" role="menuitem" data-ej-key-note="F">F</button>
                    <button type="button" role="menuitem" data-ej-key-note="F#">F#</button>
                    <button type="button" role="menuitem" data-ej-key-note="G">G</button>
                    <button type="button" role="menuitem" data-ej-key-note="G#">G#</button>
                    <button type="button" role="menuitem" data-ej-key-note="A">A</button>
                    <button type="button" role="menuitem" data-ej-key-note="A#">A#</button>
                    <button type="button" role="menuitem" data-ej-key-note="B">B</button>
                  </div>
                </div>

                <label class="ej-control-label" for="ej-scale-select">Scale</label>
                <select id="ej-scale-select" class="ej-select" data-ej-scale>
                  <option value="ionian-major">Major</option>
                  <option value="aeolian-minor">Minor</option>
                  <option value="dorian">Dorian</option>
                  <option value="mixolydian">Mixolyd.</option>
                  <option value="phrygian">Phrygian</option>
                  <option value="lydian">Lydian</option>
                  <option value="locrian">Locrian</option>
                </select>
              </div>
            </div>

            <div class="ej-neck ej-neck--high" data-ej-neck="high" aria-label="High neck">
              <div class="ej-neck-label" aria-hidden="true">HIGH</div>
              <div class="ej-neck-viewport"></div>
            </div>
          </div>
        </article>
      </section>

      <div class="carousel">
        <div class="mode-dots" role="tablist" aria-label="Mode dots">
          <button class="mode-dot is-active" role="tab" aria-selected="true" aria-controls="mode-screen-tuner" data-mode="tuner" aria-label="Chromatic Tuner" type="button"></button>
          <button class="mode-dot" role="tab" aria-selected="false" aria-controls="mode-screen-metronome" data-mode="metronome" aria-label="Metronome" type="button"></button>
          <button class="mode-dot" role="tab" aria-selected="false" aria-controls="mode-screen-fretboard" data-mode="fretboard" aria-label="Fretboard" type="button"></button>
          <button class="mode-dot" role="tab" aria-selected="false" aria-controls="mode-screen-circle-of-fifths" data-mode="circle-of-fifths" aria-label="Circle of Fifths" type="button"></button>
          <button class="mode-dot" role="tab" aria-selected="false" aria-controls="mode-screen-drum-machine" data-mode="drum-machine" aria-label="Drum Machine" type="button"></button>
          <button class="mode-dot" role="tab" aria-selected="false" aria-controls="mode-screen-extra-jimmy" data-mode="extra-jimmy" aria-label="Extra Jimmy" type="button"></button>
          <button class="mode-dot" role="tab" aria-selected="false" aria-controls="mode-screen-wild-tuna" data-mode="wild-tuna" aria-label="Wild Tuna" type="button"></button>
        </div>
      </div>

      <button id="carousel-show" class="carousel-show" type="button" aria-hidden="true">
        Show modes
      </button>
    </main>

    
    <script type="module" src="./assets/app.js"></script>
  </body>
</html>
