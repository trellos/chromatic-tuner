name: Playwright UI
on:
  pull_request:
    branches: [ main, master ]
jobs:
  e2e-ui:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: npm
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run critical desktop + mobile tuner UI checks
      run: >-
        npx playwright test tests/ui.spec.ts
        --project=chromium
        --project="Mobile Safari"
        --grep "app loads and key UI is visible with no runtime/network failures|tuner mode does not need scrollbars in current project viewport"
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report-ui
        path: playwright-report/
        retention-days: 30
